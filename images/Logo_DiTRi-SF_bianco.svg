<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="1000" height="220" role="img">
  <title>DiTRI Logo</title>
  <desc>Logo DiTRI con due cubi e frecce, racchiuso in un riquadro stondato.</desc>

  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1eb4ea"/>
      <stop offset="100%" stop-color="#2a5bb5"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L4,3 L0,6" fill="none" stroke="#2a5bb5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="30" y="5" width="790" height="210" rx="30" ry="30" fill="none" stroke="#2e82e6" stroke-width="4"/>

  <g transform="translate(40, 5) scale(0.7)">
    
    <g fill="none" stroke="#2a5bb5" stroke-width="9" stroke-linejoin="round">
      <polygon points="35,55 85,30 135,55 85,80"/>
      <polyline points="35,55 35,105 85,130 85,80"/>
      <polyline points="135,55 135,105 85,130"/>
    </g>

    <path d="M150 45 H235 V135" fill="none" stroke="#2a5bb5" stroke-width="6" marker-end="url(#arrowHead)"/>
  <path d="M145 220 H75 V140" fill="none" stroke="#2a5bb5" stroke-width="6" marker-end="url(#arrowHead)"/>

    <g fill="none" stroke="#2a5bb5" stroke-width="7" stroke-linejoin="round">
      <polygon points="175,190 225,165 275,190 225,215"/>
      <polygon points="175,190 175,245 225,270 225,215"/>
      <polygon points="275,190 275,245 225,270 225,215"/>

      <g fill="#2a5bb5" stroke="#2a5bb5" stroke-width="4.5">
        <circle cx="175" cy="190" r="7"/>
        <circle cx="225" cy="165" r="7"/>
        <circle cx="275" cy="190" r="7"/>
        <circle cx="225" cy="215" r="7"/>
        <circle cx="175" cy="245" r="7"/>
        <circle cx="225" cy="270" r="7"/>
        <circle cx="275" cy="245" r="7"/>
      </g>
    </g>

  </g>

  <text x="270" y="185" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="200" letter-spacing="-25">
    <tspan fill="#2a5bb5">D</tspan>
    <tspan fill="#2a5bb5">i</tspan>
    <tspan fill="#ff0000">T</tspan>
    <tspan fill="#00aa33">R</tspan>
    <tspan fill="#2e82e6">I</tspan>
  </text>

</svg>
